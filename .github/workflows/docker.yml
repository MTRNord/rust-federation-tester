name: Build and Push Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # Build each (platform × feature-set) combination in parallel
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        features:
          # Default: otel + otlp + redis-backend  →  main / latest / vX.Y.Z / X.Y
          - name: default
            cargo_flags: ""
            tag_suffix: ""
          # No Redis: otel + otlp only  →  main-no-redis / latest-no-redis / …
          - name: no-redis
            cargo_flags: "--no-default-features --features otel,otlp"
            tag_suffix: "-no-redis"
          # No OTel: redis-backend only  →  main-no-otel / latest-no-otel / …
          - name: no-otel
            cargo_flags: "--no-default-features --features redis-backend"
            tag_suffix: "-no-otel"
          # Minimal: no optional deps  →  main-minimal / latest-minimal / …
          - name: minimal
            cargo_flags: "--no-default-features"
            tag_suffix: "-minimal"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform name
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtrnord/rust-federation-tester
          flavor: |
            suffix=${{ matrix.features.tag_suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            CARGO_FEATURES=${{ matrix.features.cargo_flags }}
          outputs: type=image,name=ghcr.io/mtrnord/rust-federation-tester,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}-${{ matrix.features.name }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}-${{ matrix.features.name }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # Prefix "server-" so merge jobs never accidentally match test-harness artifacts
          name: server-digests-${{ steps.platform.outputs.pair }}-${{ matrix.features.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform digests into a multi-arch manifest — one per feature-set
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        features:
          - name: default
            tag_suffix: ""
          - name: no-redis
            tag_suffix: "-no-redis"
          - name: no-otel
            tag_suffix: "-no-otel"
          - name: minimal
            tag_suffix: "-minimal"

    steps:
      - name: Download digests for this feature set
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          # "server-digests-*-{feature}" never matches test-harness artifacts
          pattern: server-digests-*-${{ matrix.features.name }}
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtrnord/rust-federation-tester
          flavor: |
            suffix=${{ matrix.features.tag_suffix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/mtrnord/rust-federation-tester@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/mtrnord/rust-federation-tester:${{ steps.meta.outputs.version }}

  # Build the lean test-harness CLI image (no DB, no SMTP, just matrix-federation-test binary)
  build-test-harness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform name
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtrnord/matrix-federation-test
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test-harness
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/mtrnord/matrix-federation-test,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}-test-harness
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}-test-harness

      - name: Export digest
        run: |
          mkdir -p /tmp/digests-test-harness
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-test-harness/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # Prefix "test-harness-" so merge jobs never accidentally match server artifacts
          name: test-harness-digests-${{ steps.platform.outputs.pair }}
          path: /tmp/digests-test-harness/*
          if-no-files-found: error
          retention-days: 1

  merge-test-harness:
    runs-on: ubuntu-latest
    needs: build-test-harness
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-test-harness
          # "test-harness-digests-*" never matches server artifacts
          pattern: test-harness-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtrnord/matrix-federation-test
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests-test-harness
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/mtrnord/matrix-federation-test@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/mtrnord/matrix-federation-test:${{ steps.meta.outputs.version }}
