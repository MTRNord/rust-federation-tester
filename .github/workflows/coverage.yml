# This workflow runs code coverage using cargo-llvm-cov + cargo-nextest and uploads as GitHub artifact
# No external services required

name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add llvm-tools component
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Collect coverage data
        run: |
          cargo llvm-cov nextest \
            --workspace \
            --exclude loadtest \
            --exclude migration \
            --profile ci \
            --no-report

      - name: Generate coverage reports
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --html --output-dir target/coverage/html

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(cargo llvm-cov report --summary-only | grep -oP '\d+\.\d+(?=%)' | tail -1)
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.sha }}
          path: target/coverage/html/

      - name: Upload LCOV coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-${{ github.sha }}
          path: lcov.info

      # Save PR number + coverage for the comment workflow.
      # The comment is posted by coverage-comment.yml (workflow_run trigger) which
      # runs in the base repo context and therefore has pull-requests: write even
      # for fork PRs. This job intentionally has no write permissions.
      - name: Save PR info for comment workflow
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p /tmp/pr-info
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-info/pr_number.txt
          echo "${{ steps.coverage.outputs.percentage }}"  > /tmp/pr-info/coverage.txt

      - name: Upload PR info artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-info
          path: /tmp/pr-info/
          retention-days: 1
